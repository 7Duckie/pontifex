version: 2
updates:

  - package-ecosystem: "composer"
    directory: "/"
    # Dependency updates enter the promotion model at the bottom tier and
    # flow up through the dev -> staging -> main gates (ADR 0007).
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "security"
    # Group dev-only and runtime updates separately so they can be
    # reviewed with different urgency. Security updates always come
    # through individually (Dependabot's default for security PRs).
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"

  # npm carries one development dependency only: @wordpress/env, which provides
  # the WordPress + database environment the integration tests run against. It
  # is pinned (package.json + package-lock.json) so CI cannot break on a surprise
  # wp-env release; this keeps it current through the same dev gate.
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
