name: CI

on:
  push:
    branches: [main, staging, dev]
    tags: ['v*']
  pull_request:
    branches: [main, staging, dev]

permissions:
  contents: read
  security-events: write   # for OSV-Scanner SARIF upload

jobs:

  quality-gates:
    name: Quality gates (PHP ${{ matrix.php_version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php_version: ['8.2', '8.3', '8.4', '8.5']

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify tag matches plugin version (ADR 0003)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail

          tag_version="${GITHUB_REF#refs/tags/v}"

          header_version="$(grep -m1 '^ \* Version:' pontifex.php | awk '{print $3}')"
          if [ -z "$header_version" ]; then
            echo "::error::Could not extract Version line from pontifex.php"
            exit 1
          fi

          constant_version="$(grep "define( 'PONTIFEX_VERSION'" pontifex.php | sed -E "s/.*'([^']+)'.*/\1/")"
          if [ -z "$constant_version" ]; then
            echo "::error::Could not extract PONTIFEX_VERSION constant from pontifex.php"
            exit 1
          fi

          if [ "$tag_version" != "$header_version" ]; then
            echo "::error::Tag $tag_version does not match plugin header Version: $header_version"
            exit 1
          fi

          if [ "$tag_version" != "$constant_version" ]; then
            echo "::error::Tag $tag_version does not match PONTIFEX_VERSION constant: $constant_version"
            exit 1
          fi

          echo "Tag $tag_version matches both header ($header_version) and constant ($constant_version). OK."

      - name: Set up PHP ${{ matrix.php_version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php_version }}
          extensions: mbstring, openssl, sodium, zlib, json, pcre, zstd
          coverage: none
          tools: composer:v2

      - name: Cache Composer downloads
        uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php_version }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ matrix.php_version }}-

      - name: Validate composer.json (strict)
        run: composer validate --strict

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      # --- Quality gates ---------------------------------------------

      - name: Lint (PHPCS)
        run: composer lint

      - name: Static analysis (PHPStan)
        run: composer analyse

      - name: Tests (PHPUnit)
        run: composer test

      # --- Security ---------------------------------------------------

      - name: Composer audit (Packagist advisories)
        run: composer audit --abandoned=report

      - name: OSV-Scanner (cross-ecosystem advisories)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.8
        with:
          scan-args: |-
            --lockfile=composer.lock

      - name: Gitleaks (committed-secret scan)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration:
    name: Integration suite (PHP ${{ matrix.php_version }})
    runs-on: ubuntu-latest

    # Tiered gates (ADR 0007, as amended 2026-07-11): the real-database
    # round-trip suite runs on EVERY pull request — the unit suite mocks
    # WordPress throughout, so a green fast gate proves nothing about real
    # database behaviour, and the restore-safety findings of the engine audit
    # all shipped through dev gates that never touched MySQL. What stays
    # tiered is the breadth: a dev-bound run boots wp-env once, on the PHP
    # floor, keeping day-to-day iteration quick; the release-bound promotions
    # (pull requests targeting staging or main, and pushes to those branches
    # or a release tag) still run the whole PHP matrix — plus pushes to dev,
    # so every merge commit is proven too.
    if: >-
      (github.event_name == 'pull_request') ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))

    strategy:
      fail-fast: false
      matrix:
        php_version: ${{ (github.base_ref == 'dev' || github.ref == 'refs/heads/dev') && fromJSON('["8.2"]') || fromJSON('["8.2", "8.3", "8.4", "8.5"]') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up PHP ${{ matrix.php_version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php_version }}
          extensions: mbstring, openssl, sodium, zlib, json, pcre, zstd
          coverage: none
          tools: composer:v2

      - name: Cache Composer downloads
        uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php_version }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ matrix.php_version }}-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install pinned wp-env
        run: npm ci

      # The integration suite needs a real WordPress and database. wp-env
      # provides both (the same setup used locally). It is configured as a
      # standalone tests environment in .wp-env.tests.json (the wp-env
      # separate-config model, replacing the deprecated dual-environment
      # default); .wp-env.tests.override.json pins the container PHP to the
      # matrix entry, the override file wp-env reads for that config.
      - name: Pin the wp-env PHP version to the matrix entry
        run: |
          echo '{ "phpVersion": "${{ matrix.php_version }}" }' > .wp-env.tests.override.json

      - name: Start the wp-env tests environment
        run: npx @wordpress/env start --config .wp-env.tests.json

      - name: Confirm the container honoured PHP ${{ matrix.php_version }}
        run: |
          npx @wordpress/env run cli php -v --config .wp-env.tests.json
          actual="$(npx @wordpress/env run cli php -v --config .wp-env.tests.json 2>/dev/null | grep -oE 'PHP [0-9]+\.[0-9]+' | head -1 | awk '{print $2}')"
          echo "Detected container PHP: ${actual} (expected ${{ matrix.php_version }})"
          [ "${actual}" = "${{ matrix.php_version }}" ] || { echo "::error::wp-env did not honour PHP ${{ matrix.php_version }} (got ${actual})"; exit 1; }

      - name: Run the integration suite against real WordPress
        run: npx @wordpress/env run cli --env-cwd=wp-content/plugins/pontifex composer test:integration --config .wp-env.tests.json

  plugin-check:
    name: Plugin Check (built package)
    runs-on: ubuntu-latest

    # Plugin Check posts its summary as a pull-request comment, so this job
    # needs pull-requests: write. Scoped to this job only — the others keep the
    # minimal top-level permissions.
    permissions:
      contents: read
      pull-requests: write

    # Same tiered gate as the integration suite (ADR 0007). Plugin Check runs
    # against the *built* package — the exact tree .distignore produces, with
    # production-only dependencies — not the source checkout. That is what a
    # user installs, and it is the only way to catch a broken .distignore
    # before release (the lesson from v0.4.6, where a glob/anchored .distignore
    # silently excluded nothing and would have shipped the whole dev tree).
    if: >-
      (github.event_name == 'pull_request' && (github.base_ref == 'staging' || github.base_ref == 'main')) ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')))

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, openssl, sodium, zlib, json, pcre, zstd
          coverage: none
          tools: composer:v2, wp-cli

      - name: Install production Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --no-progress

      - name: Build the distributable package
        run: |
          set -euo pipefail
          # WP-CLI's package installer rejects the modern GitHub token format
          # (the ghs_/github_pat_ prefixes contain characters its validator
          # disallows, so passing a token fails with "github oauth token ...
          # contains invalid characters"). dist-archive is a public repository,
          # so clear every token source and install it anonymously.
          composer config --global --unset github-oauth.github.com 2>/dev/null || true
          unset GITHUB_TOKEN GH_TOKEN 2>/dev/null || true
          wp package install wp-cli/dist-archive-command:^2.0
          wp dist-archive . "${RUNNER_TEMP}/pontifex.tar.gz" --format=targz
          mkdir -p build
          # Strip the single top-level plugin folder so build/ directly holds the
          # shipped tree (its name varies by dist-archive version).
          tar -xzf "${RUNNER_TEMP}/pontifex.tar.gz" -C build --strip-components=1
          echo "Built tree (this is what would ship):"
          ls -la build

      - name: Run Plugin Check on the built package
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./build
          slug: pontifex
